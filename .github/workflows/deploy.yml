name: Deploy WhatsApp Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ========================
  # DEPLOY WORKER TO CLOUDFLARE
  # ========================
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: ./worker
          command: deploy
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      
      - name: Upload secrets to deployed worker
        working-directory: ./worker
        run: |
          echo '${{ secrets.WHATSAPP_TOKEN }}' | npx wrangler secret put WHATSAPP_TOKEN
          echo '${{ secrets.WHATSAPP_PHONE_ID }}' | npx wrangler secret put WHATSAPP_PHONE_ID
          echo '${{ secrets.WHATSAPP_APP_SECRET }}' | npx wrangler secret put WHATSAPP_APP_SECRET
          echo '${{ secrets.JWT_SECRET }}' | npx wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  # ========================
  # DEPLOY FRONTEND TO GITHUB PAGES
  # ========================
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
